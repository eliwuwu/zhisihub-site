      <stop offset=".48" stop-color="#fff8e8" stop-opacity=".96"/>
      <stop offset="1" stop-color="#d6bd73" stop-opacity=".35"/>
    </linearGradient>
    <radialGradient id="touch" cx="50%" cy="50%" r="50%">
