<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1000" viewBox="0 0 1200 1000" role="img" aria-labelledby="title desc">
  <title id="title">白质神经光束</title>
  <desc id="desc">透明底的暖白神经连接光束，带柔和光触点。</desc>
  <defs>
    <linearGradient id="fiber" x1="120" y1="760" x2="1040" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5f6060" stop-opacity=".08"/>
      <stop offset=".42" stop-color="#c0b08a" stop-opacity=".46"/>
      <stop offset=".7" stop-color="#fff4d8" stop-opacity=".92"/>
      <stop offset="1" stop-color="#8a8170" stop-opacity=".18"/>
    </linearGradient>
    <linearGradient id="core" x1="180" y1="720" x2="930" y2="260" gradientUnits="userSpaceOnUse">
