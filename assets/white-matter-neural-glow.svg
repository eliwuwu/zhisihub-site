      <stop offset=".32" stop-color="#ffe9a8" stop-opacity=".95"/>
      <stop offset="1" stop-color="#d6b04e" stop-opacity="0"/>
    </radialGradient>
    <filter id="warm-glow" x="-25%" y="-25%" width="150%" height="150%">
