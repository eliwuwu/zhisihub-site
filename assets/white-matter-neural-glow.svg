      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.98  0 1 0 0 0.83  0 0 1 0 0.48  0 0 0 .72 0" result="gold"/>
      <feMerge>
        <feMergeNode in="gold"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="contact-glow" x="-180%" y="-180%" width="460%" height="460%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 1 0 0 .82  0 0 1 0 .36  0 0 0 .85 0" result="halo"/>
      <feMerge>
        <feMergeNode in="halo"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
